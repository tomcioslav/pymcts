site_name: pymcts
site_description: A generic AlphaZero-style training engine for two-player zero-sum games
repo_url: https://github.com/tomcioslav/pymcts

docs_dir: content
site_dir: site

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            show_signature_annotations: true
            separate_signature: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - MCTS Explained: concepts/mcts.md
    - Architecture: concepts/architecture.md
  - Guide:
    - Creating a Game: guide/creating-a-game.md
    - Creating a Neural Net: guide/creating-a-neural-net.md
    - Training: guide/training.md
    - Evaluation: guide/evaluation.md
  - API Reference:
    - Core Abstractions: reference/core.md
    - Engine Components: reference/engine.md
    - Configuration: reference/config.md
    - Bridgit Implementation: reference/bridgit.md
  - Bridgit:
    - Game Rules: bridgit/rules.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true
